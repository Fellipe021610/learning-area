<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Bolo css</title>
  <style>
    /* Estilo geral da página */
    body {
      font-family: Arial, sans-serif; /* Fonte usada no site */
      background: linear-gradient(135deg, #fff5e1, #ffe0b2); /* Fundo com gradiente suave */
      margin: 0; /* Remove margens padrão do navegador */
      padding: 20px; /* Espaço interno da página */
    }

    /* Cabeçalho */
    header {
      background-color: #40c51b; /* Cor de fundo verde */
      color: #fff; /* Texto branco */
      text-align: center; /* Centraliza o texto */
      padding: 20px; /* Espaço interno */
      border-radius: 8px; /* Cantos arredondados */
    }

    /* Caixa de cada bolo */
    .bolos {
      background: #fff; /* Fundo branco */
      padding: 20px; /* Espaço interno */
      margin: 20px auto; /* Espaço externo e centralização */
      border-radius: 8px; /* Cantos arredondados */
      width: 300px; /* Largura fixa */
      text-align: center; /* Centraliza conteúdo */
      box-shadow: 0 4px 10px rgba(0,0,0,0.1); /* Sombra leve */
    }

    /* Título dentro da caixa */
    .bolos h2 {
      margin-bottom: 15px; 
    }

    /* Botões */
    button {
      background-color: #40c51b; 
      color: white; 
      border: none; 
      padding: 12px 20px; 
      border-radius: 8px; 
      cursor: pointer; 
      font-size: 16px; 
      font-weight: bold; 
      transition: background-color 0.3s ease; 
    }

    /* Efeito ao passar o mouse */
    button:hover {
      background-color: #2e8b15; 
    }

    /* Mensagem de confirmação */
    #mensagem {
      margin-top: 15px; /* Espaço acima da mensagem */
      font-size: 14px; /* Tamanho da fonte */
      color: #333; /* Cor cinza escuro */
    }
  </style>
</head>
<body>
  <!-- Cabeçalho -->
  <header>
    <h1>Bolo da Raquel</h1>
    <p>Escolha seu bolo favorito!</p>
  </header>

  <!-- Caixa de bolo de chocolate -->
  <div class="bolos">
    <h2>Bolo de Chocolate</h2>
    <button onclick="comprar('Bolo de Chocolate')">Comprar</button>
  </div>

  <!-- Caixa de bolo de morango -->
  <div class="bolos">
    <h2>Bolo de Morango</h2>
    <button onclick="comprar('Bolo de Morango')">Comprar</button>
  </div>

  <!-- Caixa de bolo de baunilha -->
  <div class="bolos">
    <h2>Bolo de Baunilha</h2>
    <button onclick="comprar('Bolo de Baunilha')">Comprar</button>
  </div>

  <!-- Mensagem que aparece após clicar -->
  <p id="mensagem"></p>

  <script>
    /* Função chamada quando o usuário clica em "Comprar" */
    function comprar(nomeBolo) {
      // Seleciona o parágrafo com id "mensagem" e altera o texto
      document.getElementById("mensagem").textContent =
        `Você escolheu ${nomeBolo}! Obrigado pela compra.`;
    }
  </script>
</body>
</html>
